<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 200" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1b2a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tsBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1b2838;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#121f2e;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="200" fill="url(#tsBg)" rx="8"/>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" fill="#94a3b8" font-size="10" letter-spacing="3" font-weight="600">TECHNOLOGY STACK</text>

  <!-- Frontend box -->
  <rect x="20" y="45" width="295" height="140" rx="6" fill="url(#tsBox)" stroke="#1e3a5f" stroke-width="0.5"/>
  <rect x="20" y="45" width="295" height="3" rx="1.5" fill="#3b82f6"/>
  <text x="167" y="72" text-anchor="middle" fill="#60a5fa" font-size="10" letter-spacing="2" font-weight="600">FRONTEND</text>
  <text x="40" y="96" fill="#e2e8f0" font-size="12" font-weight="600">React 18</text>
  <text x="40" y="112" fill="#64748b" font-size="9">UI framework + hooks</text>
  <text x="40" y="132" fill="#e2e8f0" font-size="12" font-weight="600">Three.js + R3F</text>
  <text x="40" y="148" fill="#64748b" font-size="9">3D WebGL rendering</text>
  <text x="40" y="168" fill="#e2e8f0" font-size="12" font-weight="600">satellite.js</text>
  <text x="40" y="180" fill="#64748b" font-size="9">Client-side SGP4 propagation</text>
  <text x="190" y="96" fill="#e2e8f0" font-size="12" font-weight="600">Vite</text>
  <text x="190" y="112" fill="#64748b" font-size="9">Build tool + HMR</text>
  <text x="190" y="132" fill="#e2e8f0" font-size="12" font-weight="600">Tailwind CSS</text>
  <text x="190" y="148" fill="#64748b" font-size="9">Utility-first styling</text>

  <!-- Backend box -->
  <rect x="335" y="45" width="295" height="140" rx="6" fill="url(#tsBox)" stroke="#1e3a5f" stroke-width="0.5"/>
  <rect x="335" y="45" width="295" height="3" rx="1.5" fill="#f97316"/>
  <text x="482" y="72" text-anchor="middle" fill="#fb923c" font-size="10" letter-spacing="2" font-weight="600">BACKEND</text>
  <text x="355" y="96" fill="#e2e8f0" font-size="12" font-weight="600">FastAPI</text>
  <text x="355" y="112" fill="#64748b" font-size="9">Async REST framework</text>
  <text x="355" y="132" fill="#e2e8f0" font-size="12" font-weight="600">Skyfield</text>
  <text x="355" y="148" fill="#64748b" font-size="9">Pass prediction engine</text>
  <text x="355" y="168" fill="#e2e8f0" font-size="12" font-weight="600">Uvicorn</text>
  <text x="355" y="180" fill="#64748b" font-size="9">ASGI server</text>
  <text x="505" y="96" fill="#e2e8f0" font-size="12" font-weight="600">SGP4</text>
  <text x="505" y="112" fill="#64748b" font-size="9">Orbital mechanics</text>
  <text x="505" y="132" fill="#e2e8f0" font-size="12" font-weight="600">Pydantic</text>
  <text x="505" y="148" fill="#64748b" font-size="9">Request validation</text>

  <!-- Data box -->
  <rect x="650" y="45" width="290" height="140" rx="6" fill="url(#tsBox)" stroke="#1e3a5f" stroke-width="0.5"/>
  <rect x="650" y="45" width="290" height="3" rx="1.5" fill="#22c55e"/>
  <text x="795" y="72" text-anchor="middle" fill="#4ade80" font-size="10" letter-spacing="2" font-weight="600">DATA SOURCES</text>
  <text x="670" y="96" fill="#e2e8f0" font-size="12" font-weight="600">CelesTrak</text>
  <text x="670" y="112" fill="#64748b" font-size="9">NORAD TLE catalog</text>
  <text x="670" y="132" fill="#e2e8f0" font-size="12" font-weight="600">Two-Line Elements</text>
  <text x="670" y="148" fill="#64748b" font-size="9">Orbital parameters</text>
  <text x="670" y="168" fill="#e2e8f0" font-size="12" font-weight="600">Browser GPS</text>
  <text x="670" y="180" fill="#64748b" font-size="9">Observer geolocation</text>
