<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1b2a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boxGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1b2838;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#121f2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boxGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2740;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111d30;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#60a5fa"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fb923c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bgGrad)"/>
  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#60a5fa" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="540"/><line x1="40" y1="0" x2="40" y2="540"/>
    <line x1="80" y1="0" x2="80" y2="540"/><line x1="120" y1="0" x2="120" y2="540"/>
    <line x1="160" y1="0" x2="160" y2="540"/><line x1="200" y1="0" x2="200" y2="540"/>
    <line x1="240" y1="0" x2="240" y2="540"/><line x1="280" y1="0" x2="280" y2="540"/>
    <line x1="320" y1="0" x2="320" y2="540"/><line x1="360" y1="0" x2="360" y2="540"/>
    <line x1="400" y1="0" x2="400" y2="540"/><line x1="440" y1="0" x2="440" y2="540"/>
    <line x1="480" y1="0" x2="480" y2="540"/><line x1="520" y1="0" x2="520" y2="540"/>
    <line x1="560" y1="0" x2="560" y2="540"/><line x1="600" y1="0" x2="600" y2="540"/>
    <line x1="640" y1="0" x2="640" y2="540"/><line x1="680" y1="0" x2="680" y2="540"/>
    <line x1="720" y1="0" x2="720" y2="540"/><line x1="760" y1="0" x2="760" y2="540"/>
    <line x1="800" y1="0" x2="800" y2="540"/><line x1="840" y1="0" x2="840" y2="540"/>
    <line x1="880" y1="0" x2="880" y2="540"/><line x1="920" y1="0" x2="920" y2="540"/>
    <line x1="960" y1="0" x2="960" y2="540"/>
    <line x1="0" y1="0" x2="960" y2="0"/><line x1="0" y1="40" x2="960" y2="40"/>
    <line x1="0" y1="80" x2="960" y2="80"/><line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="160" x2="960" y2="160"/><line x1="0" y1="200" x2="960" y2="200"/>
    <line x1="0" y1="240" x2="960" y2="240"/><line x1="0" y1="280" x2="960" y2="280"/>
    <line x1="0" y1="320" x2="960" y2="320"/><line x1="0" y1="360" x2="960" y2="360"/>
    <line x1="0" y1="400" x2="960" y2="400"/><line x1="0" y1="440" x2="960" y2="440"/>
    <line x1="0" y1="480" x2="960" y2="480"/><line x1="0" y1="520" x2="960" y2="520"/>
  </g>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#94a3b8" font-size="11" letter-spacing="3" font-weight="600">SYSTEM ARCHITECTURE</text>
  <line x1="380" y1="46" x2="580" y2="46" stroke="#334155" stroke-width="1"/>

  <!-- === EXTERNAL DATA SOURCE === -->
  <g filter="url(#shadow)">
    <rect x="30" y="200" width="150" height="140" rx="8" fill="url(#boxGrad1)" stroke="#334155" stroke-width="1"/>
    <rect x="30" y="200" width="150" height="4" rx="2" fill="url(#accentGreen)"/>
  </g>
  <text x="105" y="228" text-anchor="middle" fill="#4ade80" font-size="10" letter-spacing="2" font-weight="600">DATA SOURCE</text>
  <text x="105" y="258" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">CelesTrak</text>
  <text x="105" y="278" text-anchor="middle" fill="#94a3b8" font-size="10">NORAD TLE Catalog</text>
  <text x="105" y="296" text-anchor="middle" fill="#64748b" font-size="9">Active Satellites</text>
  <text x="105" y="314" text-anchor="middle" fill="#64748b" font-size="9">2-Line Element Sets</text>
  <text x="105" y="332" text-anchor="middle" fill="#475569" font-size="8">celestrak.org/NORAD</text>

  <!-- === BACKEND === -->
  <g filter="url(#shadow)">
    <rect x="260" y="80" width="220" height="380" rx="8" fill="url(#boxGrad2)" stroke="#334155" stroke-width="1"/>
    <rect x="260" y="80" width="220" height="4" rx="2" fill="url(#accentOrange)"/>
  </g>
  <text x="370" y="108" text-anchor="middle" fill="#fb923c" font-size="10" letter-spacing="2" font-weight="600">BACKEND</text>
  <text x="370" y="130" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">FastAPI Server</text>
  <text x="370" y="148" text-anchor="middle" fill="#64748b" font-size="9">Python 3 · Uvicorn ASGI</text>

  <!-- Backend sub-boxes -->
  <rect x="278" y="165" width="184" height="50" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="370" y="183" text-anchor="middle" fill="#f97316" font-size="9" letter-spacing="1" font-weight="600">TLE CACHE</text>
  <text x="370" y="200" text-anchor="middle" fill="#94a3b8" font-size="10">Thread-safe · 60 min TTL</text>

  <rect x="278" y="225" width="184" height="50" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="370" y="243" text-anchor="middle" fill="#f97316" font-size="9" letter-spacing="1" font-weight="600">PASS PREDICTOR</text>
  <text x="370" y="260" text-anchor="middle" fill="#94a3b8" font-size="10">Skyfield · Adaptive Step</text>

  <rect x="278" y="285" width="184" height="50" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="370" y="303" text-anchor="middle" fill="#f97316" font-size="9" letter-spacing="1" font-weight="600">REST API</text>
  <text x="370" y="320" text-anchor="middle" fill="#94a3b8" font-size="10">GET /tles · POST /predict</text>

  <!-- Backend endpoints detail -->
  <text x="370" y="360" text-anchor="middle" fill="#64748b" font-size="9">GET /tles → TLE catalog JSON</text>
  <text x="370" y="378" text-anchor="middle" fill="#64748b" font-size="9">POST /predict → Rise / Peak / Set</text>
  <text x="370" y="396" text-anchor="middle" fill="#64748b" font-size="9">Azimuth · Max Altitude</text>
  <text x="370" y="418" text-anchor="middle" fill="#475569" font-size="8">CORS enabled · Pydantic models</text>
  <text x="370" y="434" text-anchor="middle" fill="#475569" font-size="8">Async handlers via asyncio.to_thread</text>
  <text x="370" y="450" text-anchor="middle" fill="#475569" font-size="8">Cache primed on startup</text>

  <!-- === FRONTEND === -->
  <g filter="url(#shadow)">
    <rect x="560" y="80" width="220" height="380" rx="8" fill="url(#boxGrad2)" stroke="#334155" stroke-width="1"/>
    <rect x="560" y="80" width="220" height="4" rx="2" fill="url(#accentBlue)"/>
  </g>
  <text x="670" y="108" text-anchor="middle" fill="#60a5fa" font-size="10" letter-spacing="2" font-weight="600">FRONTEND</text>
  <text x="670" y="130" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">React + Three.js</text>
  <text x="670" y="148" text-anchor="middle" fill="#64748b" font-size="9">Vite · Tailwind CSS</text>

  <!-- Frontend sub-boxes -->
  <rect x="578" y="165" width="184" height="50" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="670" y="183" text-anchor="middle" fill="#3b82f6" font-size="9" letter-spacing="1" font-weight="600">3D RENDERER</text>
  <text x="670" y="200" text-anchor="middle" fill="#94a3b8" font-size="10">React Three Fiber · WebGL</text>

  <rect x="578" y="225" width="184" height="50" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="670" y="243" text-anchor="middle" fill="#3b82f6" font-size="9" letter-spacing="1" font-weight="600">SGP4 PROPAGATOR</text>
  <text x="670" y="260" text-anchor="middle" fill="#94a3b8" font-size="10">satellite.js · Per-frame</text>

  <rect x="578" y="285" width="184" height="50" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="670" y="303" text-anchor="middle" fill="#3b82f6" font-size="9" letter-spacing="1" font-weight="600">INSTANCED MESH</text>
  <text x="670" y="320" text-anchor="middle" fill="#94a3b8" font-size="10">1000+ satellites · 60fps</text>

  <rect x="578" y="345" width="184" height="50" rx="5" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="670" y="363" text-anchor="middle" fill="#3b82f6" font-size="9" letter-spacing="1" font-weight="600">HUD OVERLAY</text>
  <text x="670" y="380" text-anchor="middle" fill="#94a3b8" font-size="10">Pass Table · Observer Info</text>

  <!-- Frontend details -->
  <text x="670" y="418" text-anchor="middle" fill="#64748b" font-size="9">Blue Marble texture · Stars skybox</text>
  <text x="670" y="434" text-anchor="middle" fill="#64748b" font-size="9">Billboard circles · Click-to-select</text>
  <text x="670" y="450" text-anchor="middle" fill="#64748b" font-size="9">GPS geolocation · Real-time GMST</text>

  <!-- === BROWSER === -->
  <g filter="url(#shadow)">
    <rect x="830" y="200" width="110" height="140" rx="8" fill="url(#boxGrad1)" stroke="#334155" stroke-width="1"/>
    <rect x="830" y="200" width="110" height="4" rx="2" fill="url(#accentPurple)"/>
  </g>
  <text x="885" y="228" text-anchor="middle" fill="#c084fc" font-size="10" letter-spacing="2" font-weight="600">CLIENT</text>
  <text x="885" y="258" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Browser</text>
  <text x="885" y="278" text-anchor="middle" fill="#94a3b8" font-size="10">WebGL Canvas</text>
  <text x="885" y="296" text-anchor="middle" fill="#64748b" font-size="9">GPS API</text>
  <text x="885" y="314" text-anchor="middle" fill="#64748b" font-size="9">User Interaction</text>
  <text x="885" y="332" text-anchor="middle" fill="#475569" font-size="8">Click · Rotate · Zoom</text>

  <!-- === ARROWS === -->
  <!-- CelesTrak → Backend -->
  <line x1="180" y1="270" x2="254" y2="270" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowGreen)" filter="url(#glow)"/>
  <text x="217" y="260" text-anchor="middle" fill="#4ade80" font-size="8" font-weight="600">TLEs</text>

  <!-- Backend → Frontend -->
  <line x1="480" y1="190" x2="572" y2="190" stroke="#fb923c" stroke-width="2" marker-end="url(#arrowOrange)" filter="url(#glow)"/>
  <text x="526" y="183" text-anchor="middle" fill="#fb923c" font-size="8" font-weight="600">TLE JSON</text>

  <line x1="480" y1="310" x2="572" y2="310" stroke="#fb923c" stroke-width="2" marker-end="url(#arrowOrange)" filter="url(#glow)"/>
  <text x="526" y="303" text-anchor="middle" fill="#fb923c" font-size="8" font-weight="600">Passes</text>

  <!-- Frontend → Backend (request) -->
  <line x1="572" y1="250" x2="480" y2="250" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <text x="526" y="243" text-anchor="middle" fill="#60a5fa" font-size="8">POST /predict</text>

  <!-- Frontend → Browser -->
  <line x1="780" y1="270" x2="824" y2="270" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)" filter="url(#glow)"/>
  <text x="802" y="260" text-anchor="middle" fill="#60a5fa" font-size="8" font-weight="600">WebGL</text>

  <!-- Legend -->
  <g transform="translate(30, 480)">
    <text x="0" y="0" fill="#64748b" font-size="9" letter-spacing="1" font-weight="600">TECH STACK</text>
    <text x="0" y="18" fill="#475569" font-size="9">Python 3 · FastAPI · Skyfield · SGP4 · React 18 · Three.js · satellite.js · Vite · Tailwind CSS</text>
    <text x="0" y="36" fill="#475569" font-size="9">Data: CelesTrak NORAD Active Satellite Catalog · TLE Two-Line Element Sets · 60-min cache TTL</text>
  </g>
</svg>